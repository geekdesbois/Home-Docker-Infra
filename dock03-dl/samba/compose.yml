services:
  samba:
    image: dperson/samba
    container_name: samba
    env_file:
      - /etc/portainer-env/dl-samba.env
    ports:
      - "445:445"
    volumes:
      - /srv/downloads/qbittorrent/downloads:/downloads
    entrypoint: ["/bin/sh", "-c"]
    command: >
      exec /usr/bin/samba.sh
      -p
      -u "$$SAMBA_USER;$$SAMBA_PASS"
      -s "downloads;/downloads;yes;no;no;$$SAMBA_USER"
    restart: unless-stopped