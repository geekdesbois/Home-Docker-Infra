services:
  gluetun:
    image: qmcgaw/gluetun:v3.41.1
    container_name: gluetun
    cap_add: [ "NET_ADMIN" ]
    devices:
      - /dev/net/tun:/dev/net/tun
    env_file: 
      - /etc/portainer-env/dl-automation.env
    environment:
      VPN_PORT_FORWARDING_UP_COMMAND: /gluetun/update_qbt_port.sh {{PORT}} {{VPN_INTERFACE}}
      VPN_PORT_FORWARDING_DOWN_COMMAND: /gluetun/reset_qbt_port.sh
      IPV6: "off"
    volumes:
      - /docker/gluetun:/gluetun
    ports:
      - "8888:8888"   # qB WebUI (derrière VPN)
      - "9696:9696"    # Prowlarr (derrière VPN)
      - "3000:3000"     # Firefox http sandbox (derrière VPN)
      - "3001:3001"     # Firefox https sandbox (derrière VPN)
      - "8082:8082"     # Firefox websocket sandbox (derrière VPN)

    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "service:gluetun"
    env_file: 
      - /etc/portainer-env/dl-automation.env    
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
      - WEBUI_PORT=8888
    volumes:
      - /docker/qbittorrent:/config
      - /srv/downloads/qbittorrent:/data
    depends_on: [ gluetun ]
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    network_mode: "service:gluetun"
    env_file: 
      - /etc/portainer-env/dl-automation.env    
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
    volumes:
      - /docker/prowlarr:/config
    depends_on: [ gluetun ]
    restart: unless-stopped

  firefox_sandbox:
    image: lscr.io/linuxserver/firefox:latest
    container_name: firefox-sandbox
    network_mode: "service:gluetun"
    shm_size: "1gb"
    env_file: 
      - /etc/portainer-env/dl-automation.env    
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
  #   - CUSTOM_USER=abc
  #   - PASSWORD=abc
      - SUBFOLDER=/
      - TITLE=Firefox
      - DISABLE_IPV6=true
      - NO_DECOR=1
      - CUSTOM_PORT=3000
      - CUSTOM_HTTPS_PORT=3001
      - CUSTOM_WS_PORT=8082
    volumes:
      - /docker/firefox:/config
      - /srv/downloads/qbittorrent:/data
    depends_on: [ gluetun ]
    restart: unless-stopped

  # ARR hors VPN (mais DNS Pi-hole), accès aux médias RO/RW
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    env_file: 
      - /etc/portainer-env/dl-automation.env    
    dns: [ "${DNS_PIHOLE}" ]
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
    volumes:
      - /docker/radarr:/config
      - /srv/downloads/qbittorrent:/data
      - /mnt/media-gold:/media-gold:ro
      - /mnt/media-upgrade:/media:rw
    ports:
      - "7878:7878"
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    env_file: 
      - /etc/portainer-env/dl-automation.env    
    dns: [ "${DNS_PIHOLE}" ]
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
    volumes:
      - /docker/sonarr:/config
      - /srv/downloads/qbittorrent:/data
      - /mnt/media-gold:/media-gold:ro
      - /mnt/media-upgrade:/media:rw
    ports:
      - "8989:8989"
    restart: unless-stopped

  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    env_file: 
      - /etc/portainer-env/dl-automation.env    
    dns: [ "${DNS_PIHOLE}" ]
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
    volumes:
      - /docker/lidarr:/config
      - /srv/downloads/qbittorrent:/data
      - /mnt/media-gold:/media-gold:ro
      - /mnt/media-upgrade:/media:rw
    ports:
      - "8686:8686"
    restart: unless-stopped

