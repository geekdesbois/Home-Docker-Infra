services:
  gluetun:
    image: qmcgaw/gluetun:v3.41.1
    container_name: gluetun
    cap_add: [ "NET_ADMIN" ]
    dns: 172.16.90.1
    devices:
      - /dev/net/tun:/dev/net/tun
    env_file: 
      - /etc/portainer-env/dl-automation-gluetun.env
    environment:
      VPN_PORT_FORWARDING_UP_COMMAND: /gluetun/update_qbt_port.sh {{PORT}} {{VPN_INTERFACE}}
      VPN_PORT_FORWARDING_DOWN_COMMAND: /gluetun/reset_qbt_port.sh
      IPV6: "off"
      DNS_KEEP_NAMESERVER: "on"
      DNS_UPSTREAM_RESOLVER_TYPE: plain
#     DNS_UPSTREAM_PLAIN_ADDRESSES: 172.16.90.1:53
      FIREWALL_OUTBOUND_SUBNETS: 172.16.0.0/12
      # Proxy HTTP Gluetun
      HTTPPROXY: "on"
      HTTPPROXY_LISTENING_ADDRESS: ":8889"
      # optionnel si tu veux une auth proxy :
      # HTTPPROXY_USER: "proxyuser"
      # HTTPPROXY_PASSWORD: "proxypass"
    volumes:
      - /docker/gluetun:/gluetun
    ports:
      - "8888:8888"   # qB WebUI (derrière VPN)
      - "9696:9696"    # Prowlarr (derrière VPN)
      - "8889:8889"   # proxy HTTP Gluetun
      - "3000:3000"     # Firefox http sandbox (derrière VPN)
      - "3001:3001"     # Firefox https sandbox (derrière VPN)
    # - "8082:8082"     # Firefox websocket sandbox (derrière VPN)
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9999/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "service:gluetun"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
      - WEBUI_PORT=8888
    volumes:
      - /docker/qbittorrent:/config
      - /srv/downloads/qbittorrent:/data
    depends_on: [ gluetun ]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8888/api/v2/app/preferences | grep -q '\"listen_port\":[1-9]'"]
      interval: 30s
      timeout: 5s
      retries: 3    
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    network_mode: "service:gluetun"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
    volumes:
      - /docker/prowlarr:/config
    depends_on: [ gluetun ]
    restart: unless-stopped

  firefox_sandbox:
    image: lscr.io/linuxserver/firefox:latest
    container_name: firefox-sandbox
    network_mode: "service:gluetun"
    shm_size: "1gb"
#   security_opt:
#     - seccomp=unconfined
    env_file: 
      - /etc/portainer-env/dl-automation-firefox.env    
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
      - SUBFOLDER=/
      - TITLE=Firefox
      - DISABLE_IPV6=true
      - NO_DECOR=1
      - CUSTOM_PORT=3000
      - CUSTOM_HTTPS_PORT=3001
#     - HTTP_PROXY=http://localhost:8889 # Set the HTTP proxy to Gluetun
#     - HTTPS_PROXY=http://localhost:8889 # Set the HTTPS proxy to Gluetun
    volumes:
      - /docker/firefox:/config
      - /srv/downloads/qbittorrent:/data
#   ports:
#     - "3000:3000"
#     - "3001:3001"
#     - "8082:8082"      
    depends_on: [ gluetun ]
    restart: unless-stopped

  # ARR hors VPN (mais DNS Pi-hole), accès aux médias RO/RW
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
    volumes:
      - /docker/radarr:/config
      - /srv/downloads/qbittorrent:/data
      - /mnt/media-gold:/media-gold:rw
      - /mnt/media-upgrade:/media:rw
    ports:
      - "7878:7878"
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
    volumes:
      - /docker/sonarr:/config
      - /srv/downloads/qbittorrent:/data
      - /mnt/media-gold:/media-gold:ro
      - /mnt/media-upgrade:/media:rw
    ports:
      - "8989:8989"
    restart: unless-stopped

  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
    volumes:
      - /docker/lidarr:/config
      - /srv/downloads/qbittorrent:/data
      - /mnt/media-gold:/media-gold:ro
      - /mnt/media-upgrade:/media:rw
    ports:
      - "8686:8686"
    restart: unless-stopped

