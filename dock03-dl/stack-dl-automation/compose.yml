  # ClamAV : signatures persistantes + scan manuel (ou cron ensuite)
  clamav:
    image: clamav/clamav:stable
    container_name: clamav
    env_file: 
      - /etc/portainer-env/dl-automation.env    
    dns: [ "${DNS_PIHOLE}" ]
    environment:
      - TZ=Europe/Paris
    volumes:
      - /docker/clamav:/var/lib/clamav
      - /srv/downloads/qbittorrent:/scan:ro
    restart: unless-stopped